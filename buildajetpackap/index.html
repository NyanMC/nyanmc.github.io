    <script type="text/javascript" src="pico8-gpio-listener.js"></script>
    <script type="module">
        import {
            Client,
            Item,
        } from "https://unpkg.com/archipelago.js@2.0.2/dist/index.js";

        // https://stackoverflow.com/a/71574505
        var params = window.location.search.slice(1).split("&");
        //convert the params to an object
        var data = params.reduce((obj, param) => {
          var pair = param.split("=");
          return { ...obj,
            [pair[0]]: decodeURIComponent(pair[1])
          }
        }, {});
        //console.log({data});
        //insert values by matching input name to data object key
        const fillable_forms = ["Hostname", "Port", "Name", "Password"]
        for (var index in fillable_forms) {
            const key = fillable_forms[index]
            if (key in data) {
                document.getElementById(key).value = data[key]
            }
        }
        // document.querySelectorAll("input").forEach(input => input.value = data[input.name]);

        // Create a new Archipelago client
        const client = new Client();

        // start chat from phar
        client.messages.on("message", onMessage);

        function onMessage(text, nodes) {
            // Plaintext to console, because why not?
            console.log(text);

            const chat = document.getElementById("chat");
            const messageElement = document.createElement("div");

            for (const node of nodes) {
                const nodeElement = document.createElement("span");
                nodeElement.innerText = node.text;

                switch (node.type) {
                    case "entrance":
                        nodeElement.style.color = "#6495ED";
                        break;

                    case "location":
                        nodeElement.style.color = "#00FF7F";
                        break;

                    case "color":
                        // not really correct, but technically the only color nodes the server returns is "green" or "red"
                        // so it's fine enough for an example.
                        nodeElement.style.color = node.color;
                        break;

                    case "player":
                        if (node.player.slot === client.players.self.slot) {
                            // It's us!
                            nodeElement.style.color = "#EE00EE";
                        } else {
                            // It's them!
                            nodeElement.style.color = "#FAFAD2";
                        }
                        break;

                    case "item": {
                        // doesn't account for prog+useful or other combinations, but this is just as an example
                        if (node.item.progression) {
                            nodeElement.style.color = "#AF99EF";
                        } else if (node.item.useful) {
                            nodeElement.style.color = "#6D8BE8";
                        } else if (node.item.trap) {
                            nodeElement.style.color = "#FA8072";
                        } else {
                            nodeElement.style.color = "#00EEEE";
                        }
                    }

                    // no special coloring needed
                    case "text":
                    default:
                        break;
                }

                messageElement.appendChild(nodeElement);
            }

            chat.appendChild(messageElement);
            messageElement.scrollIntoView(false);
        }
        // end chat from phar


        const form = document.getElementById("connection_details")

        //pico-8 related declarations
        var gpio = getP8Gpio();

        // used for shop checks
        // wasteful on pins but we have 128 of them. it's probably fine
        // [gpio pin, quantity, starting id]
        const loc_pairs = {
            "Diving Suit":
                [0,8,1],
            "Oxygen Mask":
                [1,8,9],
            "Backpack":
                [2,7,17],
            "Fins":
                [3,7,24],
            "Magnet":
                [4,8,31],
            "Raft Expansion":
                [5,3,39],
            "Jetpack":
                [6,3,42],
            "Radar":
                [7,5,45],
            "Gold Statue":
                [8,1,50],
        }


        const loc_flags = {
            "Tuna":
                [9, 0b00000001, 51],
            "Cod":
                [9, 0b00000010, 52],
            "Pollock":
                [9, 0b00000100, 53],
            "Mackerel":
                [9, 0b00001000, 54],
            "Flounder":
                [9, 0b00010000, 55],
            "Mahi":
                [9, 0b00100000, 56],
            "Halibut":
                [9, 0b01000000, 57],
            "Snapper":
                [9, 0b10000000, 58],
            "Grouper":
                [10, 0b00000001, 59],
            "Marlin":
                [10, 0b00000010, 60],
            "Pufferfish":
                [10, 0b00000100, 61],
            "Spikefin":
                [10, 0b00001000, 62],
            "Barracuda":
                [10, 0b00010000, 63],
            "Shark":
                [10, 0b00100000, 64],
            "Spacefish":
                [10, 0b01000000, 65],
            "Skyfish":
                [10, 0b10000000, 66],
            "Cloudswim":
                [11, 0b00000001, 67],
            "victory":
                [11, 0b00000010, 68],
        }

        const item_pairs = {
            "Diving Suit":
                [12, 1],
            "Oxygen Mask":
                [13, 2],
            "Backpack":
                [14, 3],
            "Fins":
                [15, 4],
            "Magnet":
                [16, 5],
            "Raft Expansion":
                [17, 6],
            "Jetpack":
                [18, 7],
            "Radar":
                [19, 8],
            "Gold Statue":
                [20, 9],
            "Money":
                [21, 10],
        }

        const base_id = 0
        let checked_locations = [];

        //add item handler for gpio layer
        client.items.on("itemsReceived", (items, index) => {
            //if this is a sync packet reset all our item addresses without changing anything else
            if (index == 0) {
                for (let pair in item_pairs) {
                    gpio[item_pairs[pair][0]] = 0
                }
            }
            //go through all our item addresses and if they are not set, check the recieved items for their ap id, and set the gpio flag if we recieved it
            //on the scale i expect pico-8 games to be, this will be good enough
            for (let pair in item_pairs) {
                for (let i=0; i<items.length; i++) {
                    let item = items[i]
                    if (base_id + item_pairs[pair][1] === item.id) {
                        if (gpio[item_pairs[pair][0]] >= 100) {
                            console.warn(`could not add ${pair}, exceeded cap of 100 (how???)`)
                        } else {
                            gpio[item_pairs[pair][0]] += 1
                            console.log(`added item ${pair}. total: ${gpio[item_pairs[pair][0]]}`)
                        }
                    }
                }
            }
        });

        // Connect to the Archipelago server
        function connect_to_server(event) {
            if (event !== null) {
                event.preventDefault()
            }
            var url = document.getElementById("Hostname").value + ":" + document.getElementById("Port").value
            var slot = document.getElementById("Name").value
            var password = document.getElementById("Password").value ? document.getElementById("Password").value : null
            var conn_options = {
                password: password
            }
            if ("Protocol" in data) {
                var pro = data["Protocol"].split("://").pop().split("@")
                url = pro[1]
                slot = pro[0].split(":")[0]
                conn_options["password"] = password ?? pro[0].split(":")[1]
            }
            console.log(url)
            console.log(slot)

            checked_locations = [];


            document.getElementById("status-connected").classList.add("default-hidden")
            document.getElementById("status-failed").classList.add("default-hidden")

            document.getElementById("status-connecting").classList.remove("default-hidden")
            client
                .login(url, slot, "Build a Jetpack", conn_options)
                .then(() => {
                    console.log("Connected to the server");
                    document.getElementById("status-connecting").classList.add("default-hidden")
                    document.getElementById("status-connected").classList.remove("default-hidden")
                    // You are now connected and authenticated to the server. You can add more code here if need be.
                })
                .catch((error) => {
                    console.error("Failed to connect:", error);
                    document.getElementById("status-connecting").classList.add("default-hidden")
                    document.getElementById("status-failed").classList.remove("default-hidden")
                    // Handle the connection error.
                });
        }
        form.addEventListener("submit", connect_to_server);

        // Disconnect from the server when unloading window.
        // window.addEventListener("beforeunload", () => {
        //     client.disconnect();
        // })

        // add location handler for gpio layer
        gpio.subscribe(async function(newIndices) {
            for (let loc in loc_flags) {
                if ((gpio[loc_flags[loc][0]] & loc_flags[loc][1]) !== 0) {
                    const locationId = base_id + loc_flags[loc][2]
                    if (loc === "victory") {
                        client.goal()
                    } else if (!checked_locations.includes(locationId)) {
                        client.check(locationId)
                        checked_locations.push(locationId);
                    }
                }
            }
            for (let loc in loc_pairs) {
                if (gpio[loc_pairs[loc][0]] > 0) {
                    for (let i = 0; i < gpio[loc_pairs[loc][0]]; i++) {
                        if (i >= loc_pairs[loc][1]) {
                            warn("${loc} location somehow exceeded max bounds")
                        } else {
                            const locationId = base_id + loc_pairs[loc][2] + i
                            if (!checked_locations.includes(locationId)) {
                                client.check(locationId)
                                checked_locations.push(locationId);
                            }
                        }
                    }
                }
            }
        });
        if (data["auto"] === "True") {
            console.log("autoconnecting")
            connect_to_server(null)
        }


    </script>

                         position:fixed; top:0px; left:0px; border:0; width:100vw; height:100vh">
                &nbsp
            </div>

            <div style="display:flex; position:relative">
                <!-- pointer-events turned off for mobile in p8_update_layout because need for desktop mouse -->
                <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault();" >
                </canvas>
                <div class=p8_menu_buttons id="p8_menu_buttons" style="margin-left:10px;">
                    <div class="p8_menu_button" style="position:absolute; bottom:125px" id="p8b_controls" onClick="p8_give_focus(); Module.pico8ToggleControlMenu();"></div>                    
                    <div class="p8_menu_button" style="position:absolute; bottom:90px" id="p8b_pause" onClick="p8_give_focus(); Module.pico8TogglePaused(); p8_update_layout_hash = -22;"></div>
                    <div class="p8_menu_button" style="position:absolute; bottom:55px" id="p8b_sound" onClick="p8_give_focus(); p8_create_audio_context(); Module.pico8ToggleSound();"></div>
                    <div class="p8_menu_button" style="position:absolute; bottom:20px" id="p8b_full" onClick="p8_give_focus(); p8_request_fullscreen();"></div>
                </div>
            </div>


            <!-- display after first layout update -->
            <div  id="touch_controls_gfx"
                  style=" pointer-events:none; display:table; 
                         position:fixed; top:0px; left:0px; border:0; width:100vw; height:100vh">

                    <img src="" id="controls_right_panel" style="position:absolute; opacity:0.5;">
                    <img src="" id="controls_left_panel" style="position:absolute;  opacity:0.5;">
                        
            
            </div> <!-- touch_controls_gfx -->

            <!-- used for clipboard access & keyboard input; displayed and used by PICO-8 only once needed. can be safely removed if clipboard / key presses not needed. -->
            <!-- (needs to be inside p8_playarea so that it still works under Chrome when fullscreened) -->
            <!-- 0.2.5: added "display:none"; pico8.js shows on demand to avoid mac osx accent character selector // https://www.lexaloffle.com/bbs/?tid=47743 -->

            <textarea id="codo_textarea" class="emscripten" style="display:none; position:absolute; left:-9999px; height:0px; overflow:hidden"></textarea>

        </div> <!--p8_playarea -->

    </div> <!-- p8_container -->

</div> <!-- p8_frame -->
</div> <!-- p8_frame_0 size limit -->

<script type="text/javascript">

    p8_update_layout();
    p8_update_button_icons();

    var canvas = document.getElementById("canvas");
    Module = {};
    Module.canvas = canvas;

    // from @ultrabrite's shell: test if an AudioContext can be created outside of an event callback.
    // If it can't be created, then require pressing the start button to run the cartridge

    if (p8_autoplay)
    {
        var temp_context = new AudioContext();
        temp_context.onstatechange = function ()
        {
            if (temp_context.state=='running')
            {
                p8_run_cart();
                temp_context.close();
            }
        };
    }

    // pointer lock request needs to be inside a canvas interaction event
    // pico8_state.request_pointer_lock is true when 0x5f2d bit 0 and bit 2 are set -- poke(0x5f2d,0x5) 
    // note on mouse acceleration for future: // https://github.com/w3c/pointerlock/pull/49
    canvas.addEventListener("click", function()
    {
        if (!p8_touch_detected)
            if (pico8_state.request_pointer_lock)
                canvas.requestPointerLock();
    });
    
</script>

    <!-- end pico cart -->
